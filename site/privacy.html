<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Politique de confidentialité — Un web de gentil 🧸</title>
  <meta name="robots" content="index,follow" />
  <link rel="alternate" hreflang="fr" href="https://nounours.app/privacy.html?lang=fr" />
  <link rel="alternate" hreflang="en" href="https://nounours.app/privacy.html?lang=en" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Nunito", system-ui, sans-serif; background: #FBF3E4; color: #3A2A1E; line-height: 1.65; margin: 0; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 40px 22px 80px; }
    h1, h2 { font-family: "Fredoka", sans-serif; }
    h1 { font-size: 2rem; margin-bottom: 4px; }
    h2 { font-size: 1.25rem; margin-top: 32px; color: #8a5a2b; }
    .updated { color: #8a6f57; font-size: .9rem; }
    .langbar { text-align: right; font-size: .9rem; margin-bottom: 8px; color: #8a6f57; }
    .langbar a { color: #c98a4b; text-decoration: none; }
    .langbar a.on { font-weight: 700; text-decoration: underline; }
    .tldr { background: #fffaf1; border: 1px solid #efe0c8; border-left: 5px solid #7BD3B0; border-radius: 12px; padding: 16px 18px; margin: 22px 0; }
    a { color: #c98a4b; }
    code { background: #fff0df; padding: 1px 6px; border-radius: 6px; }
    .back { display: inline-block; margin-top: 30px; color: #8a6f57; text-decoration: none; }
    ul { padding-left: 20px; }
    ol { padding-left: 20px; }
    .del-box { background: #fffaf1; border: 1px solid #efe0c8; border-radius: 12px; padding: 16px 18px; margin: 16px 0; }
    .del-box textarea { width: 100%; box-sizing: border-box; border: 1px solid #efe0c8; border-radius: 8px; padding: 10px; font: inherit; font-size: .9rem; resize: vertical; min-height: 72px; }
    .del-box label { display: flex; gap: 8px; align-items: flex-start; margin: 12px 0; font-size: .95rem; cursor: pointer; }
    .del-box button { font-family: "Fredoka", sans-serif; font-size: 1rem; background: #c98a4b; color: #fff; border: 0; border-radius: 10px; padding: 10px 18px; cursor: pointer; }
    .del-box button:disabled { opacity: .6; cursor: wait; }
    #delStatus { margin-top: 10px; font-size: .95rem; }
    #delStatus.ok { color: #2d6a4f; }
    #delStatus.err { color: #b42318; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="langbar">
      <span data-i18n="lang_label">Langue</span> :
      <a href="?lang=fr" id="langFr" data-i18n="lang_fr">Français</a> ·
      <a href="?lang=en" id="langEn" data-i18n="lang_en">English</a>
    </div>
    <h1>🧸 <span data-i18n="h1">Politique de confidentialité</span></h1>
    <div class="updated" data-i18n="updated"></div>

    <div class="tldr" data-i18n="tldr"></div>

    <h2 data-i18n="h2_local"></h2>
    <ul>
      <li data-i18n="li_local_1"></li>
      <li data-i18n="li_local_2"></li>
      <li data-i18n="li_local_3"></li>
    </ul>
    <p data-i18n="p_never"></p>

    <h2 data-i18n="h2_ranking"></h2>
    <p data-i18n="p_ranking_intro"></p>
    <ul>
      <li data-i18n="li_rank_1"></li>
      <li data-i18n="li_rank_2"></li>
      <li data-i18n="li_rank_3"></li>
    </ul>
    <p data-i18n="p_ranking_never"></p>

    <h2 data-i18n="h2_site"></h2>
    <p data-i18n="p_site_intro"></p>
    <ul>
      <li data-i18n="li_site_1"></li>
      <li data-i18n="li_site_2"></li>
      <li data-i18n="li_site_3"></li>
    </ul>
    <p data-i18n="p_site_outro"></p>

    <h2 data-i18n="h2_perms"></h2>
    <ul>
      <li data-i18n="li_perm_storage"></li>
      <li data-i18n="li_perm_alarms"></li>
      <li data-i18n="li_perm_urls"></li>
      <li data-i18n="li_perm_host"></li>
    </ul>

    <h2 data-i18n="h2_retention"></h2>
    <p data-i18n="p_leave"></p>
    <p data-i18n="p_delete_intro"></p>
    <ol>
      <li data-i18n="li_del_1"></li>
      <li data-i18n="li_del_2"></li>
    </ol>
    <p data-i18n="p_del_code"></p>

    <div class="del-box">
      <h3 style="margin:0 0 10px;font-family:Fredoka,sans-serif;font-size:1.1rem;color:#8a5a2b;" data-i18n="del_h3"></h3>
      <form id="delForm">
        <label for="delCode" data-i18n="del_label"></label>
        <textarea id="delCode" name="code" data-i18n-ph="del_placeholder" required></textarea>
        <label>
          <input type="checkbox" id="delConfirm" required />
          <span data-i18n="del_confirm"></span>
        </label>
        <button type="submit" id="delSubmit" data-i18n="del_submit"></button>
        <div id="delStatus" role="status" aria-live="polite"></div>
      </form>
    </div>

    <h2 data-i18n="h2_children"></h2>
    <p data-i18n="p_children"></p>

    <h2 data-i18n="h2_changes"></h2>
    <p data-i18n="p_changes"></p>

    <a class="back" href="/" data-i18n="back"></a>
  </div>
  <script src="privacy-i18n.js"></script>
  <script>
    (function () {
      const q = new URLSearchParams(location.search).get("lang");
      const nav = (navigator.language || "fr").slice(0, 2).toLowerCase();
      const LANG = q === "en" || q === "fr" ? q : (nav === "en" ? "en" : "fr");
      const D = window.PRIVACY_I18N;
      function t(k) { return (D[LANG] && D[LANG][k]) || D.fr[k] || k; }
      function apply() {
        document.documentElement.lang = LANG;
        document.title = t("title");
        document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
        document.querySelectorAll("[data-i18n-ph]").forEach((el) => { el.placeholder = t(el.dataset.i18nPh); });
        document.getElementById("langFr").classList.toggle("on", LANG === "fr");
        document.getElementById("langEn").classList.toggle("on", LANG === "en");
        window.PRIVACY_LANG = LANG;
      }
      apply();
    })();
  </script>
  <script src="delete-account.js"></script>
</body>
</html>
