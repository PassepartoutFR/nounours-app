name: Release

# À chaque tag vX.Y.Z :
#  1. build le .zip prêt-store (fichiers extension uniquement)
#  2. crée une Release GitHub avec notes auto
#  3. publie sur le Chrome Web Store SI les secrets sont configurés (sinon sauté)
# Voir docs/RELEASE.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip (Chrome / Edge)
        run: |
          mkdir -p dist/nounours-app
          cp manifest.json background.js content.js content.css mirror.js \
             popup.html popup.js scoreboard.js uwg-core.js dist/nounours-app/
          cp -r icons dist/nounours-app/
          cd dist && zip -r "../nounours-app-${GITHUB_REF_NAME}.zip" nounours-app

      - name: Build Firefox zip
        run: node scripts/build-firefox.cjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nounours-app-*.zip
            dist/nounours-firefox-*.zip
          generate_release_notes: true

      - name: Chrome Web Store publish (prérequis)
        run: |
          ok=true
          for s in CHROME_EXTENSION_ID CHROME_CLIENT_ID CHROME_CLIENT_SECRET CHROME_REFRESH_TOKEN; do
            if [ -z "${!s}" ]; then echo "::notice title=Chrome publish skipped::Secret $s manquant — voir docs/RELEASE.md ou node scripts/setup-chrome-publish.cjs"; ok=false; fi
          done
          if [ "$ok" = true ]; then echo "✅ Secrets Chrome présents — publication en cours."; fi

      - name: Publish to Chrome Web Store
        # ne s'active que lorsque les 4 secrets sont configurés.
        # NB : GitHub résout TOUTES les actions `uses:` au démarrage du job, AVANT
        # d'évaluer ce `if` — donc la version doit exister (sinon le job échoue avant
        # même de créer la Release). On épingle une version valide (v6.0.0).
        if: ${{ env.CHROME_EXTENSION_ID != '' && env.CHROME_CLIENT_ID != '' && env.CHROME_CLIENT_SECRET != '' && env.CHROME_REFRESH_TOKEN != '' }}
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: nounours-app-${{ github.ref_name }}.zip
          extension-id: ${{ env.CHROME_EXTENSION_ID }}
          client-id: ${{ env.CHROME_CLIENT_ID }}
          client-secret: ${{ env.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ env.CHROME_REFRESH_TOKEN }}
          publish: true
