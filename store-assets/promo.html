<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; height: 100%; }
    .bg {
      height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; gap: 4vh;
      background: radial-gradient(120% 120% at 20% 10%, #FBD27A 0%, #F4A93B 45%, #FF6B5E 100%);
      font-family: "Fredoka", system-ui, sans-serif; color: #3A2A1E; overflow: hidden;
    }
    .teddy { font-size: 30vh; line-height: 1; filter: drop-shadow(0 1.5vh 2vh rgba(0,0,0,.18)); }
    .txt { display: flex; flex-direction: column; }
    .t1 { font-size: 14vh; font-weight: 700; line-height: .95; }
    .t2 { font-size: 6vh; color: #5b3a1a; margin-top: 1.5vh; }
    .t3 { font-size: 5vh; font-weight: 700; color: #fff; margin-top: 2.5vh; letter-spacing: .02em; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="teddy">🧸</div>
    <div class="txt">
      <div class="t1">Un web de gentil</div>
      <div class="t2">Trolle le troll. Avec un câlin.</div>
      <div class="t3">nounours.app</div>
    </div>
  </div>
</body>
</html>
