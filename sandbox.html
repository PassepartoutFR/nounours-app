  Page SANDBOXÉE (MV3) — invisible, sans interaction. Hébergée dans une iframe par le

  new Function/eval) peut s'exécuter sans EvalError. Cette page n'a AUCUN accès aux
  API chrome.* (sandbox = origine opaque) : elle ne communique QUE par postMessage avec
  son parent (le document offscreen). Elle charge les librairies VENDORÉES (locales,
  jamais de CDN) puis le petit modèle de toxicité, et répond aux demandes de score.
  Ordre des scripts important : tf -> toxicity -> sandbox.js (notre code).
-->

<script src="vendor/toxicity.min.js"></script>
