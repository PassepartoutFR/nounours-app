<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>UWG — IA locale (offscreen)</title>
<!--
  Document OFFSCREEN (MV3) — invisible, sans interaction. N'existe QUE si l'utilisateur
  a activé l'option « IA locale » (opt-in). Il NE charge PLUS TF.js : le CSP MV3
  `extension_pages` interdit `'unsafe-eval'`, dont TF.js a besoin (new Function), ce qui
  provoquait une EvalError ici. TF.js tourne désormais dans l'iframe SANDBOXÉE ci-dessous
  (sandbox.html), dont le CSP autorise eval. Ce document reste NON sandboxé (il a besoin
  des API chrome.* : runtime + storage) et joue le rôle de RELAIS : service worker
  <-> (chrome.runtime) <-> offscreen.js <-> (postMessage) <-> iframe sandbox (TF.js).
  Si l'option est OFF, ce document n'est JAMAIS créé : zéro fetch, zéro modèle, zéro coût.
  Tout le code ci-dessous est local au paquet de l'extension.
-->
</head>
<body>
<iframe id="uwg-sandbox" src="sandbox.html" style="display:none;border:0;width:0;height:0"></iframe>
<script src="offscreen.js"></script>
</body>
</html>
